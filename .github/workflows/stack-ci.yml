name: OpenPine Stack CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

jobs:
  stack-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OpenPine
        uses: actions/checkout@v4
        with:
          path: openpine
      - name: Checkout Pine2AST
        uses: actions/checkout@v4
        with:
          repository: s7cret/pine2ast
          ref: bf2614855851e0626bbe802b6d945ce23593e886
          path: pine2ast
      - name: Checkout AST2Python
        uses: actions/checkout@v4
        with:
          repository: s7cret/ast2python
          ref: 471fd5ef4531fe8c4b8833bc0553b9876f6f01de
          path: ast2python
      - name: Checkout PineLib
        uses: actions/checkout@v4
        with:
          repository: s7cret/pinelib
          ref: 33239a0093fa5d548058d79d5d079104db0ef43e
          path: pinelib
      - name: Checkout Backtest Engine
        uses: actions/checkout@v4
        with:
          repository: s7cret/backtest_engine
          ref: 848dfd59e4a432b449a8ec7775f2b9aef0b55ecb
          path: backtest_engine
      - name: Checkout Marketdata Provider
        uses: actions/checkout@v4
        with:
          repository: s7cret/marketdata-provider
          ref: bcf733de6b0ff05d06d3fb2add5d068c52280965
          path: marketdata-provider
      - name: Checkout Optimizer
        uses: actions/checkout@v4
        with:
          repository: s7cret/optimizer
          ref: 2922b0c515ad6e68cf0a078635235604b4c3c220
          path: optimizer
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install stack
        run: |
          python -m pip install -U pip
          python -m pip install -e './openpine[dev]'
          python -m pip install --no-deps -e ./marketdata-provider
          python -m pip install --no-deps -e ./pinelib
          python -m pip install --no-deps -e ./pine2ast
          python -m pip install --no-deps -e ./ast2python
          python -m pip install --no-deps -e ./backtest_engine
          python -m pip install --no-deps -e ./optimizer
      - name: Verify installed stack versions
        run: |
          python - <<'PY'
          from importlib.metadata import version

          distributions = (
              'openpine',
              'pine2ast',
              'ast2python',
              'pinelib',
              'backtest-engine',
              'marketdata-provider',
              'optimizer',
          )
          for distribution in distributions:
              installed = version(distribution)
              if installed != '4.0.0':
                  raise SystemExit(f'{distribution}: expected 4.0.0, got {installed!r}')
              print(distribution, installed)
          PY
      - name: Cross-project compiler/runtime E2E
        env:
          PINE_STACK_ROOT: ${{ github.workspace }}
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: python -m pytest -q ast2python/tests/integration/test_v1_0_cross_project_e2e.py
      - name: Seven-library release reports
        run: |
          (cd openpine && python -m openpine.release --root .)
          (cd pine2ast && python -m pine2ast.release --root .)
          (cd ast2python && python -m ast2python.release --root .)
          (cd pinelib && python -m pinelib.release --root .)
          (cd backtest_engine && python -m backtest_engine.release --root .)
          (cd marketdata-provider && python -m marketdata_provider.release --root .)
          (cd optimizer && python -m optimizer.release --root .)
