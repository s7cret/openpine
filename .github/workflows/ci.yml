name: OpenPine CI
on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e '.[dev]'
      - run: bash scripts/release_gate.sh

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openpine-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: openpine-ui/package-lock.json
      - name: Install exact npm toolchain
        run: npm install --global npm@11.16.0
      - name: Verify npm toolchain
        run: test "$(npm --version)" = "11.16.0"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high
